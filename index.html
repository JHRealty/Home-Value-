<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julian Hernandez | Home Value</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:#fff;
  background:#0d0f14;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:24px;
}

.logo{
  width:260px;
  display:block;
  margin:0 auto 20px;
}

h1{
  font-size:36px;
  line-height:1.1;
}

.accent{color:#d4af62}

.sub{
  color:#bbb;
  margin-top:10px;
}

.card{
  margin-top:30px;
  background:#141922;
  padding:20px;
  border-radius:16px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  background:#d4af62;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="wrap">

<img src="logo.png" class="logo">

<h1>See what your home <span class="accent">could sell for</span></h1>

<p class="sub">Get a fast home value estimate in under a minute.</p>

<div class="card">
<form>
<input placeholder="Property address">
<input placeholder="Full name">
<input placeholder="Phone number">
<input placeholder="Email">
<textarea placeholder="Anything else?"></textarea>
<button>Get My Estimate</button>
</form>
</div>

</div>
</body>
</html>
